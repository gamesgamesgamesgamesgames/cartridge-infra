name: Build caddy-cloudflare image

on:
  workflow_dispatch:
    inputs:
      caddy_version:
        description: "Caddy version (e.g. 2.10.0)"
        required: true
        default: "2.10.0"
  push:
    branches: [main]
    paths:
      - 'files/kart-pds/Dockerfile.caddy'
      - '.github/workflows/build-caddy-cloudflare.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Caddy version
        id: ver
        env:
          CADDY_VERSION_INPUT: ${{ github.event.inputs.caddy_version }}
        run: |
          VER="${CADDY_VERSION_INPUT:-2.10.0}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: files/kart-pds
          file: files/kart-pds/Dockerfile.caddy
          push: true
          build-args: |
            CADDY_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/gamesgamesgamesgamesgames/caddy-cloudflare:${{ steps.ver.outputs.version }}
            ghcr.io/gamesgamesgamesgamesgames/caddy-cloudflare:latest
