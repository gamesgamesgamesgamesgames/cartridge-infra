name: Build tranquil-pds image

on:
  workflow_dispatch:
    inputs:
      tranquil_ref:
        description: "tranquil-pds git ref (branch, tag, or full SHA from tangled.org/tranquil.farm/tranquil-pds)"
        required: true
        default: "main"
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Clone tranquil-pds
        env:
          TRANQUIL_REF: ${{ github.event.inputs.tranquil_ref }}
        run: |
          REF="${TRANQUIL_REF:-main}"
          git clone https://tangled.org/tranquil.farm/tranquil-pds.git src
          cd src
          git checkout "$REF"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:${{ env.sha }}
            ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:${{ env.full_sha }}
            ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:latest

      - name: Summary
        run: |
          echo "Pushed tranquil-pds image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:${{ env.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:${{ env.full_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/gamesgamesgamesgamesgames/tranquil-pds:latest\`" >> "$GITHUB_STEP_SUMMARY"
