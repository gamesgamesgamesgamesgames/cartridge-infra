---
- name: Provision HappyView (appview)
  hosts: appview
  roles:
    - base
  tasks:
    # --- Extra packages appview needs ---
    - name: Install sqlite3
      apt:
        name: sqlite3
        state: present

    # --- Deploy user ---
    - name: Create deploy user
      user:
        name: deploy
        groups: docker
        append: true
        shell: /bin/bash

    # --- Application directories ---
    - name: Create data directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ happyview_data_dir }}"
        - "{{ happyview_data_dir }}/plugins"
        - "{{ pg_backup_dir }}"

    # --- Deploy templates ---
    - name: Deploy docker-compose.yml
      template:
        src: ../templates/appview/docker-compose.yml.j2
        dest: "{{ happyview_data_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy Caddyfile
      template:
        src: ../templates/appview/Caddyfile.j2
        dest: "{{ happyview_data_dir }}/Caddyfile"
        mode: "0644"

    - name: Deploy happyview.env
      template:
        src: ../templates/appview/happyview.env.j2
        dest: "{{ happyview_data_dir }}/happyview.env"
        mode: "0600"

    # --- Backup ---
    - name: Deploy backup script
      template:
        src: ../templates/appview/pg-backup.sh.j2
        dest: "{{ happyview_data_dir }}/pg-backup.sh"
        mode: "0755"

    - name: Deploy backup service
      template:
        src: ../templates/appview/pg-backup.service.j2
        dest: /etc/systemd/system/pg-backup.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy backup timer
      template:
        src: ../templates/appview/pg-backup.timer.j2
        dest: /etc/systemd/system/pg-backup.timer
        mode: "0644"
      notify: reload systemd

    # --- Start services ---
    - name: Flush handlers
      meta: flush_handlers

    - name: Pull Docker images
      command: docker compose pull
      args:
        chdir: "{{ happyview_data_dir }}"

    - name: Start the stack
      command: docker compose up -d
      args:
        chdir: "{{ happyview_data_dir }}"

    - name: Enable backup timer
      systemd:
        name: pg-backup.timer
        enabled: true
        state: started
        daemon_reload: true
