      - name: CAN_VIEW_LABELS_FOR_ENTITY
        allow_all: true
      - name: CAN_VIEW_LABELS
        allow_all: true
      - name: CAN_VIEW_DOCS
        allow_all: true
      - name: CAN_VIEW_EVENTS_BY_ENTITY
        allow_all: true
      - name: CAN_VIEW_EVENTS_BY_ACTION
        allow_all: true
